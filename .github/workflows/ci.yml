name: CI/CD Pipeline
on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
jobs:
    build-and-test:
        name: Build and Test
        runs-on: ubuntu-latest
        steps:
            - name: Checkout du code
              uses: actions/checkout@v4

            - name: Install Bun
              uses: oven-sh/setup-bun@v2

            - name: Installation des dépendances
              run: bun ci

            - name: Lint
              run: bun run lint

            - name: Test
              run: bun run test

            - name: Build
              run: bun run build
