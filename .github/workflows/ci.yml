name: CI/CD Pipeline
on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
jobs:
    build-and-test:
        name: Build and Test
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                bun-version: ["1.2", "1.3"]
        steps:
            - name: Checkout du code
              uses: actions/checkout@v4

            - name: Install Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: ${{ matrix.bun-version }}

            - name: Installation des dépendances
              run: bun ci

            - name: Lint
              run: bun run lint

            - name: Test
              run: bun run test:coverage

            - name: Coverage Summary
              if: matrix.bun-version == '1.2'
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-summary
                  path: coverage/coverage-summary.json

            - name: Build
              run: bun run build
